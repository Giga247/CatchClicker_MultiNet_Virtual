<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CatchClicker MultiNet</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="CatchClicker MultiNet prototype">
      <section class="device" aria-label="CatchClicker MultiNet device">
        <img class="device-image" src="./assets/catchclicker-multinet-base.png" alt="" aria-hidden="true" />

        <svg class="display-layer" id="displayLayer" viewBox="0 0 1086 1462" aria-hidden="true"></svg>

        <button class="control control-plus" type="button" data-action="plus" aria-label="Plus">
          <span></span>
          <span></span>
        </button>
        <button class="control control-save" type="button" data-action="save">SAVE</button>
        <button class="control control-minus" type="button" data-action="minus" aria-label="Minus">
          <span></span>
        </button>
        <button class="control control-reset" type="button" data-action="reset">Pause<br />Reset</button>
        <button class="control control-adjust" type="button" data-action="adjust">Adjust</button>
        <button class="control control-net" type="button" data-action="net">Net</button>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
